name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          rm -rf ~/.gradle/caches
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Install deps
        run: make android-install-deps

      - name: Prepare
        run: make android-apk-prepare

      - name: Build APK
        run: make android-apk-release

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: Hiddify-APKs
          path: |
            build/app/outputs/flutter-apk/*arm64-v8a*.apk
            build/app/outputs/flutter-apk/*armeabi-v7a*.apk
            build/app/outputs/flutter-apk/*x86_64*.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
